name: 'build'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #          - platform: 'macos-latest' # for Arm based macs (M1 and above).
          #            args: '--target aarch64-apple-darwin'
          #          - platform: 'macos-latest' # for Intel based macs.
          #            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'ubuntu-24.04-arm' # Only available in public repos.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'  || matrix.platform == 'ubuntu-24.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm' # Set this to npm, yarn or pnpm.

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: npm install # change this to npm or pnpm depending on which one you use.

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'App v__VERSION__'
          releaseId: __RELEASE_ID__
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-aur:
    needs: publish-tauri
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download AppImage and compute checksum
        id: checksum
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APPIMAGE="projecttracker_${VERSION}_amd64.AppImage"
          wget -q "https://github.com/sampyeatt/ProjectTracker/releases/download/app-v${VERSION}/${APPIMAGE}" -O "${APPIMAGE}"
          SHA256=$(sha256sum "${APPIMAGE}" | cut -d' ' -f1)
          echo "SHA256=${SHA256}" >> $GITHUB_OUTPUT
          echo "APPIMAGE=${APPIMAGE}" >> $GITHUB_OUTPUT

      - name: Generate PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256=${{ steps.checksum.outputs.SHA256 }}
          cp aur/PKGBUILD ./PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/sha256sums_x86_64=('SKIP')/sha256sums_x86_64=('${SHA256}')/" PKGBUILD

      - name: Build AUR package
        run: |
          docker run --rm \
            -v "$PWD:/build" \
            -w /build \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm &&
              pacman -S --noconfirm base-devel &&
              useradd -m builduser &&
              chown -R builduser /build &&
              su builduser -c 'makepkg --noconfirm --noprogressbar --nodeps'
            "

      - name: Upload AUR package to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG=$(ls *.pkg.tar.zst | head -1)
          gh release upload "app-v${VERSION}" "${PKG}" --clobber